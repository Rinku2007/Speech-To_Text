
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Speech to Text</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
  <h1>🎤 AI Speech to Text</h1>

  <div class="upload-box">
    <input type="file" id="audioFile" accept="audio/*">
    <button onclick="uploadAudio()">Convert</button>
    <button id="micBtn" onclick="toggleMic()">🎙️ Speak</button>  </div>
  <textarea id="output" placeholder="✨ Transcribed text will appear here..."></textarea>

  <button class="download-btn" onclick="downloadText()">⬇ Download Text</button>
</div>

<script src="/static/script.js"></script>
</body>
</html>
